

services:

  gitlab:

    image: gitlab/gitlab-ce:latest

    container_name: gitlab

    restart: always

    hostname: 'infinity-app-alb-167884405.eu-central-1.elb.amazonaws.com'

    environment:

      GITLAB_OMNIBUS_CONFIG: |

        external_url 'http://infinity-app-alb-167884405.eu-central-1.elb.amazonaws.com'

        registry_external_url 'http://infinity-app-alb-167884405.eu-central-1.elb.amazonaws.com:5050'

        gitlab_rails['gitlab_shell_ssh_port'] = 2222

    ports:

      - '80:80'

      - '443:443'

      - '2222:22'

      - '5050:5050'

    volumes:

      - '/srv/gitlab/config:/etc/gitlab'

      - '/srv/gitlab/logs:/var/log/gitlab'

      - '/srv/gitlab/data:/var/opt/gitlab'

    shm_size: '256m'
